name: Deploy Mainnet

# CD（mainnet）：push 到 production 分支 → 跑测试 → 通过后自动 flyctl deploy。
# 全自动、无人工审批门（用户决策）；CI 门天然内建（deploy 有 needs: test）。
# app 名从仓库变量 FLY_APP_PROD 读取（主实例=gridtrade-prod），未设置直接报错退出——
# 同项目多实例部署防冲突（fail-fast，spec 2026-07-14-fly-app-parameterization）。
# 需 GitHub repo secret FLY_API_TOKEN_PROD（`fly tokens create deploy -a <你的prod app>` 生成，
# deploy token 按 app 签发——每个实例各自生成）+ 仓库变量 FLY_APP_PROD。
on:
  push:
    branches: [production]

jobs:
  test:
    name: pytest (py3.9)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # TA-Lib 0.6.8 提供 manylinux bundled wheel，含 C 库，无需系统 ta-lib（与 ci.yml 一致）
          pip install TA-Lib==0.6.8
          pip install pytest

      - name: Run tests
        env:
          TZ: Asia/Shanghai
        run: python -m pytest -q

  deploy:
    name: flyctl deploy (mainnet)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Resolve app name (fail-fast)
        run: |
          if [ -z "${{ vars.FLY_APP_PROD }}" ]; then
            echo "::error::仓库变量 FLY_APP_PROD 未设置——app 名必须显式指定（多实例防冲突）。到 Settings → Secrets and variables → Actions → Variables 添加，主实例值为 gridtrade-prod。"
            exit 1
          fi

      - name: Deploy to Fly (mainnet)
        run: flyctl deploy --config deploy/fly.prod.toml --dockerfile deploy/Dockerfile --remote-only --app "${{ vars.FLY_APP_PROD }}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_PROD }}
