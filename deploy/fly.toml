# Fly.io 部署配置 —— GridTradeGP（Hyperliquid）。
# 区域 nrt（东京）：HL 验证节点在 AWS ap-northeast-1，nrt 同城最近。
#
# 两个角色：
#   - monitor：常驻 ~5s 循环（对账补单 + 记账 + 止盈止损 + 重启自愈）。本 fly.toml 的
#     [processes] 把它跑成常驻机；进程退出由 fly 按 restart policy 自动重启。
#   - scheduler：scale-to-zero 一次性（每小时唤醒跑一遍）。fly.toml 的 process group 不带
#     cron，故 scheduler 用 **scheduled machine** 单独创建（见 deploy/DEPLOY.md ops 步骤）。
#
# 健康判活：用库内 heartbeats 行（HeartbeatRepository），不暴露 HTTP，故无 [http_service]。

app = "gridtrade-hl"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

# 非敏感默认配置（敏感项走 `fly secrets set`：HL_WALLET_ADDRESS / HL_PRIVATE_KEY / DATABASE_URL）
[env]
  EXCHANGE = "hyperliquid"
  HL_TESTNET = "true"          # 先 testnet 跑通；切 mainnet 时置 "false"
  MONITOR_INTERVAL_SEC = "5"
  SCHEDULER_PERIOD = "12H"
  UTC_OFFSET = "8"
  MAX_CONCURRENT = "20"
  # CAP / LEVERAGE / TOTAL_BUDGET / BLACKLIST_SYMBOLS 按需在此或 secrets 配置

[processes]
  monitor = "python -m gridtrade.runtime.monitor"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  processes = ["monitor"]
