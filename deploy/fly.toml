# Fly.io 部署配置 —— GridTradeBi（Binance USDT-M testnet）。
# 区域 nrt（东京）：币安 API 亚太直连无地域封锁。
#
# 两个常驻角色（各一台机器，同一镜像；fly deploy 一键同时更新）：
#   - monitor：~5s 循环（对账补单 + 记账 + 止盈止损 + 重启自愈）。
#   - scheduler：自己睡到整点跑一遍（关旧 tag → 选币 → 准入 → 开新）。
#     做成 process group 而非 scale-to-zero 定时机，这样 CI/CD 的 fly deploy 能随 monitor
#     一起更新它的镜像（定时机不属于 process group，deploy 不会刷新其代码）。
#   进程退出由 fly 按 restart policy 自动重启。
#
# 健康判活：用库内 heartbeats 行（HeartbeatRepository），不暴露 HTTP，故无 [http_service]。

# app 名不写死：由 CI 仓库变量 FLY_APP_TESTNET（deploy.yml --app）或手动 `fly deploy -a <app名>`
# 提供——同项目多实例部署防冲突，未指定即被 flyctl 拒绝（fail-fast，
# spec 2026-07-14-fly-app-parameterization）。币安 testnet 主实例 = gridtrade-bi-test
#（全新独立环境；旧 gridtrade-hl 为 HL 遗留环境，冻结保留互不干扰）。
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

# 发布前一次性钩子：先 create（空库按当前模型建全表，幂等）再 migrate（增量加列，幂等）。
# 全新环境（gridtrade-bi-test 是新建空库）裸 migrate 会因表不存在（NoSuchTableError）失败
# abort 发布，故与 prod 同用 create && migrate：空库时 create 建全表、migrate no-op；
# 后续 create no-op、migrate 负责加列（与 fly.prod.toml 同理）。
[deploy]
  release_command = "sh -c 'python -m gridtrade.runtime.dbadmin create && python -m gridtrade.runtime.dbadmin migrate'"

# 非敏感默认配置（敏感项走 `fly secrets set`：BINANCE_API_KEY / BINANCE_API_SECRET / DATABASE_URL）
[env]
  EXCHANGE = "binance"
  BINANCE_TESTNET = "true"     # 先 testnet 跑通；切 mainnet 时置 "false"
  MONITOR_INTERVAL_SEC = "5"
  SCHEDULER_PERIOD = "12H"
  MAX_CONCURRENT = "12"
  # 仓位参数体系(spec 2026-07-07-account-leverage-gearing):frac=AL/(N×gearing/2)=3.5/20.4≈0.1716
  GRID_GEARING = "3.4"
  ACCOUNT_LEVERAGE = "5.0"
  # MarketShockBrake(spec 2026-07-08):|票池中位数4h收益|≥4% → 暂停开格2h(只关不开);THR=0 停用
  SHOCK_THR = "0.025"
  SHOCK_K_HOURS = "4"
  SHOCK_PAUSE_HOURS = "2"
  MIN_ORDER_NOTIONAL = "5"     # 开仓预检全局下限，与按币 MIN_NOTIONAL 取 max（spec 2026-07-14 §5.3，testnet 同 mainnet 口径）
  UNIVERSE_TOP_VOLUME_PCT = "0.55"  # 票池=24h 成交额前 55% 相对口径（与 mainnet 同口径，spec 2026-07-14-universe-top-volume-pct）
  SCHEDULER_RUN_ON_START = "true"   # testnet 调试：scheduler 启动即跑一次；稳定后置 "false"
  # 档0 硬禁名单单源在 gridtrade/config.py DEFAULT_TIER_POLICY.tier0（与 mainnet 同口径）；
  # env 仅作紧急覆盖。手动 OPEN_GRID 指令不经票池、不受此限（testnet 实验自由度保留）。
  # CAP / TOTAL_BUDGET / BLACKLIST_SYMBOLS 按需在此或 secrets 配置(旧键 LEVERAGE/CAP_EQUITY_FRAC 已退役,设置即 boot 报错)

[processes]
  monitor = "python -m gridtrade.runtime.monitor"
  scheduler = "python -m gridtrade.runtime.scheduler"
  web = "python -m gridtrade.runtime.web"

# web dashboard：常驻至少 1 台（long-live）。放弃 scale-to-zero —— CI 滚动部署不会为
# min=0 的新进程组创建首台机器（空组又无法 fly scale count），min=1 让部署直接建/留 web 机器。
# 仍允许负载下扩容、闲时回落到 1。monitor/scheduler 无 http_service、各自常驻。
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["web"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  processes = ["monitor", "scheduler", "web"]
