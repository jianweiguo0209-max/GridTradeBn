# Fly.io 部署配置 —— GridTradeGP Mainnet 生产环境（Hyperliquid mainnet）。
# 与 testnet deploy/fly.toml 共用同一镜像与全部业务代码；差异见
# docs/superpowers/specs/2026-07-03-mainnet-production-environment-design.md。
# 独立 app（gridtrade-prod）+ 独立 Postgres（gridtrade-pg-prod），与 testnet 完全隔离。

app = "gridtrade-prod"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

# 发布前一次性钩子：先 create（空库按当前模型建全表，幂等）再 migrate（增量加列，幂等）。
# mainnet 首次部署面对全新空库，裸 migrate 会因表不存在（NoSuchTableError）失败 abort 发布，
# 故用 create && migrate：空库时 create 建全表、migrate no-op；后续 create no-op、migrate 负责加列。
[deploy]
  release_command = "sh -c 'python -m gridtrade.runtime.dbadmin create && python -m gridtrade.runtime.dbadmin migrate'"

# 非敏感默认配置（敏感项走 `fly secrets set`：HL_WALLET_ADDRESS / HL_PRIVATE_KEY /
# DATABASE_URL（attach 已设）/ DASHBOARD_*）。
[env]
  EXCHANGE = "hyperliquid"
  HL_TESTNET = "false"              # ← mainnet，真金白银
  MONITOR_INTERVAL_SEC = "5"
  SCHEDULER_PERIOD = "12H"
  MAX_CONCURRENT = "20"
  SCHEDULER_RUN_ON_START = "false"  # ← 生产：避免每次自动部署把网格中途关开、烧真手续费
  # 币池：HL mainnet 按 24h 成交额排名的【非 meme 且交易所 maxLeverage≥5】流动性 Top26
  # （2026-07-03 快照，经 list_instruments 校准为真实 live 永续 canonical 符号）。筛选：
  #   1) 剔除 meme/degen（FARTCOIN/PUMP/kPEPE/DOGE/PENGU/SPX 等）；
  #   2) 剔除 maxLeverage<5 的币（如 VVV=3），避免其对策略 5x sizing 的名义仓位保证金不足被拒。
  # 全部逐个核过 swap=True/active=True。resolve_live_universe 仅在此名单内选币；放开到全池时
  # 清空此项即可（见 universe.py：whitelist 空 -> 全 live 减黑名单）。
  UNIVERSE_WHITELIST = "BTC/USDC:USDC,ETH/USDC:USDC,HYPE/USDC:USDC,SOL/USDC:USDC,ZEC/USDC:USDC,LIT/USDC:USDC,WLD/USDC:USDC,XRP/USDC:USDC,NEAR/USDC:USDC,GRAM/USDC:USDC,SUI/USDC:USDC,XPL/USDC:USDC,UNI/USDC:USDC,AAVE/USDC:USDC,ENA/USDC:USDC,LINK/USDC:USDC,BCH/USDC:USDC,ADA/USDC:USDC,TAO/USDC:USDC,JTO/USDC:USDC,AVAX/USDC:USDC,ZRO/USDC:USDC,BNB/USDC:USDC,DYDX/USDC:USDC,XMR/USDC:USDC,PAXG/USDC:USDC"
  # 风控项（CAP / CAP_MIN / CAP_MAX / LEVERAGE）沿用 config.py 默认或按需 fly secrets 覆盖。
  # 单网格 cap = clamp(equity×CAP_EQUITY_FRAC, CAP_MIN, CAP_MAX)；每笔挂单 notional ≈
  #   cap×LEVERAGE×max_rate/(档数+1)。
  # CAP_EQUITY_FRAC=0.50（非默认 0.10 覆写）：本金 ~$220 小额下，0.10 会让 cap≈$22 →
  #   每笔挂单 ≈$3，低于 HL mainnet 全市场 $10 最小下单额（cost.min=10）→ 首批网格挂单被全数
  #   拒单、建不起来。经 testnet 实测标定：cap≈$98 时最差单笔 $9.71（SOL/22 档），最差
  #   单笔/cap≈0.099；取 frac=0.50 → cap≈$110 → 最差单笔 ~$10.9（$10 上留缓冲），MarginGate
  #   (default_cap=$100) 仍放行 ~2 个并发网格、实际保证金 ~$75/格。
  # ⚠ 小账户 band-aid，非鲁棒：equity 回撤 或 某币档数偏高（比值<0.099）时单笔可能再跌破 $10
  #   （该网格开仓安全失败、不损资金）。长期鲁棒解=加本金到 cap 天然≥$10，或给 grid_order_info
  #   接入 cost.min 自适应降档（见巡检结论）。放大本金后应把此项调回 0.10。
  CAP_EQUITY_FRAC = "0.50"

[processes]
  monitor = "python -m gridtrade.runtime.monitor"
  scheduler = "python -m gridtrade.runtime.scheduler"
  web = "python -m gridtrade.runtime.web"

# web dashboard：常驻 ≥1 台（min_machines_running=1，与 testnet 同理，见 deploy/DEPLOY.md）。
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["web"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  processes = ["monitor", "scheduler", "web"]
