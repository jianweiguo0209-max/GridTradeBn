# Fly.io 部署配置 —— GridTradeBi Mainnet 生产环境（Binance USDT-M mainnet）。
# 与 testnet deploy/fly.toml 共用同一镜像与全部业务代码；差异见
# docs/superpowers/specs/2026-07-03-mainnet-production-environment-design.md。
# 独立 app（gridtrade-prod）+ 独立 Postgres（gridtrade-pg-prod），与 testnet 完全隔离。

app = "gridtrade-prod"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

# 发布前一次性钩子：先 create（空库按当前模型建全表，幂等）再 migrate（增量加列，幂等）。
# mainnet 首次部署面对全新空库，裸 migrate 会因表不存在（NoSuchTableError）失败 abort 发布，
# 故用 create && migrate：空库时 create 建全表、migrate no-op；后续 create no-op、migrate 负责加列。
[deploy]
  release_command = "sh -c 'python -m gridtrade.runtime.dbadmin create && python -m gridtrade.runtime.dbadmin migrate'"

# 非敏感默认配置（敏感项走 `fly secrets set`：BINANCE_API_KEY / BINANCE_API_SECRET /
# DATABASE_URL（attach 已设）/ DASHBOARD_*）。
[env]
  EXCHANGE = "binance"
  BINANCE_TESTNET = "false"          # ← mainnet，真金白银
  MONITOR_INTERVAL_SEC = "5"
  MONITOR_PARALLEL = "4"            # per-grid 并行监控（2026-07-06 快照版验证后回 4：读路径 AccountSnapshot 化，权重与格数/并发解耦、429 根因已除；1=串行保底）
  SCHEDULER_PERIOD = "12H"
  MAX_CONCURRENT = "12"
  # 仓位参数体系(spec 2026-07-07-account-leverage-gearing):frac=AL/(N×gearing/2)=3.5/20.4≈0.1716
  GRID_GEARING = "3.4"
  ACCOUNT_LEVERAGE = "5.0"
  # MarketShockBrake(spec 2026-07-08):|票池中位数4h收益|≥4% → 暂停开格2h(只关不开);THR=0 停用
  SHOCK_THR = "0.025"
  SHOCK_K_HOURS = "4"
  SHOCK_PAUSE_HOURS = "2"
  SCHEDULER_RUN_ON_START = "false"  # ← 生产：避免每次自动部署把网格中途关开、烧真手续费
  # 币池：全市场动态（2026-07-04 起已去 UNIVERSE_WHITELIST，无该项即走此模式）。
  # resolve_live_universe = 全部 live 永续 swap（list_instruments 只留 swap + canonical
  # 去重）−黑名单(BLACKLIST_SYMBOLS，无条件生效)−24h 成交额地板(MIN_QUOTE_VOLUME_24H)，
  # 再由 select_grid_coin 做 55% 相对成交额过滤 + 因子排名选出当轮开仓币种。设计见
  # docs/superpowers/specs/2026-07-04-candidate-universe-port-design.md。
  MIN_QUOTE_VOLUME_24H = "1000000"
  MIN_ORDER_NOTIONAL = "5"          # 开仓预检全局下限，与按币 MIN_NOTIONAL 取 max（spec 2026-07-14 §5.3，密网币直接门链拒，不留死 OPENING）  # 全市场动态币池 $1M 绝对 24h 成交额地板（代码默认 0.0，仅 prod 生效）
  # 档0 硬禁名单单源在 gridtrade/config.py DEFAULT_TIER_POLICY.tier0（legacy 移植 9 币，
  # spec 2026-07-06-tiered-*）；此处 env 仅作运维紧急覆盖（非空才生效），名单变更走代码
  # commit 两侧（实盘/回测）原子同步。已持有的被禁币不强平，随 12H 换仓自然退出。
  # 风控项（CAP / CAP_MIN / CAP_MAX）沿用 config.py 默认或按需 fly secrets 覆盖。
  # 单网格 cap = clamp(equity×frac, CAP_MIN, CAP_MAX)，frac=ACCOUNT_LEVERAGE/(MAX_CONCURRENT×GRID_GEARING/2)
  #   =3.5/20.4≈0.1716(equity $3k→cap≈$521)；每笔挂单 notional≈cap×gearing/(档数+1) 须
  #   ≥max(MIN_ORDER_NOTIONAL=5, 该币 min_cost)（币安按币 5/20/50，非旧 HL 单一 $10；见
  #   MinNotionalGate/Instrument.min_cost）。
  # 旧键 LEVERAGE/CAP_EQUITY_FRAC 已退役——设置即 boot 报错(语义变更禁静默映射)。
  # 历史(CAP_EQUITY_FRAC 时代)：$220 本金 0.10→单笔$3<$10 全拒、临时 0.50 band-aid(记忆 mainnet-order-min-notional)。
  # ⚠ 与 frac 无关的独立局限：高档数币（如 LIT 51 档，需 cap≥$335）用任何现实 cap 都够不着 $10、
  #   开仓安全失败留 stuck OPENING（不损资金）；根治须给 grid_order_info 接入 cost.min 自适应封顶档数。

[processes]
  monitor = "python -m gridtrade.runtime.monitor"
  scheduler = "python -m gridtrade.runtime.scheduler"
  web = "python -m gridtrade.runtime.web"

# web dashboard：常驻 ≥1 台（min_machines_running=1，与 testnet 同理，见 deploy/DEPLOY.md）。
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["web"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  processes = ["monitor", "scheduler", "web"]
