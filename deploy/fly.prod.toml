# Fly.io 部署配置 —— GridTradeGP Mainnet 生产环境（Hyperliquid mainnet）。
# 与 testnet deploy/fly.toml 共用同一镜像与全部业务代码；差异见
# docs/superpowers/specs/2026-07-03-mainnet-production-environment-design.md。
# 独立 app（gridtrade-prod）+ 独立 Postgres（gridtrade-pg-prod），与 testnet 完全隔离。

app = "gridtrade-prod"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

# 发布前一次性钩子：先 create（空库按当前模型建全表，幂等）再 migrate（增量加列，幂等）。
# mainnet 首次部署面对全新空库，裸 migrate 会因表不存在（NoSuchTableError）失败 abort 发布，
# 故用 create && migrate：空库时 create 建全表、migrate no-op；后续 create no-op、migrate 负责加列。
[deploy]
  release_command = "sh -c 'python -m gridtrade.runtime.dbadmin create && python -m gridtrade.runtime.dbadmin migrate'"

# 非敏感默认配置（敏感项走 `fly secrets set`：HL_WALLET_ADDRESS / HL_PRIVATE_KEY /
# DATABASE_URL（attach 已设）/ DASHBOARD_*）。
[env]
  EXCHANGE = "hyperliquid"
  HL_TESTNET = "false"              # ← mainnet，真金白银
  MONITOR_INTERVAL_SEC = "5"
  MONITOR_PARALLEL = "4"            # per-grid 并行监控（2026-07-06 快照版验证后回 4：读路径 AccountSnapshot 化，权重与格数/并发解耦、429 根因已除；1=串行保底）
  SCHEDULER_PERIOD = "12H"
  MAX_CONCURRENT = "20"
  SCHEDULER_RUN_ON_START = "false"  # ← 生产：避免每次自动部署把网格中途关开、烧真手续费
  # 币池：全市场动态（2026-07-04 起已去 UNIVERSE_WHITELIST，无该项即走此模式）。
  # resolve_live_universe = 全部 live 永续 swap（list_instruments 只留 swap + canonical
  # 去重）−黑名单(BLACKLIST_SYMBOLS，无条件生效)−24h 成交额地板(MIN_QUOTE_VOLUME_24H)，
  # 再由 select_grid_coin 做 55% 相对成交额过滤 + 因子排名选出当轮开仓币种。设计见
  # docs/superpowers/specs/2026-07-04-candidate-universe-port-design.md。
  MIN_QUOTE_VOLUME_24H = "1000000"
  MIN_ORDER_NOTIONAL = "10"         # 开仓预检：单笔挂单名义额 ≥ HL 最小下单额（密网币直接门链拒，不留死 OPENING）  # 全市场动态币池 $1M 绝对 24h 成交额地板（代码默认 0.0，仅 prod 生效）
  BLACKLIST_SYMBOLS = ""            # 档0 硬禁名单，留空=不禁；上线前由用户填 HL coin 符号，如 "XXX/USDC:USDC,YYY/USDC:USDC"
  # 风控项（CAP / CAP_MIN / CAP_MAX / LEVERAGE）沿用 config.py 默认或按需 fly secrets 覆盖。
  # 单网格 cap = clamp(equity×CAP_EQUITY_FRAC, CAP_MIN, CAP_MAX)；每笔挂单 notional ≈
  #   cap×LEVERAGE×max_rate/(档数+1)，须 ≥ HL mainnet 全市场 $10 最小下单额（cost.min=10）。
  # CAP_EQUITY_FRAC=0.10（config.py 默认）：本金已增至 ~$1000+（2026-07-04 追加 800→equity~$1021）
  #   → cap≈$102，正是 testnet 验证过的 ~$98-100 量级，普通币（~20 档）单笔 $10-14 稳过 $10，
  #   MarginGate(default_cap=$100) 可放行 ~10 个并发网格（回到"多小网格分散"设计）。
  # 历史：上线时本金仅 ~$220，0.10→cap≈$22→单笔≈$3<$10 首批全被拒；曾临时覆写 0.50（cap≈$110）
  #   作小账户 band-aid（见记忆 mainnet-order-min-notional）；本金充足后回调默认 0.10。
  # ⚠ 与 frac 无关的独立局限：高档数币（如 LIT 51 档，需 cap≥$335）用任何现实 cap 都够不着 $10、
  #   开仓安全失败留 stuck OPENING（不损资金）；根治须给 grid_order_info 接入 cost.min 自适应封顶档数。
  CAP_EQUITY_FRAC = "0.10"

[processes]
  monitor = "python -m gridtrade.runtime.monitor"
  scheduler = "python -m gridtrade.runtime.scheduler"
  web = "python -m gridtrade.runtime.web"

# web dashboard：常驻 ≥1 台（min_machines_running=1，与 testnet 同理，见 deploy/DEPLOY.md）。
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["web"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  processes = ["monitor", "scheduler", "web"]
